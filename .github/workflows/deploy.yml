name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let one deploy finish before the next starts; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm install (not ci): the macOS-generated lockfile omits Linux-only
      # optional deps (Tailwind oxide's wasm fallback -> @emnapi/*), which makes
      # strict `npm ci` fail on the Linux runner.
      - run: npm install --no-audit --no-fund
      # Project Pages serve under /<repo>/, so set the asset base accordingly.
      - run: npm run build -- --base=/labeler/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
